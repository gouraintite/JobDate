<div class="container mx-auto px-4 py-10 max-w-2xl">
  <h1 class="text-2xl font-bold mb-8">{{ isEdit ? 'Modifier l\'événement' : 'Créer un job dating' }}</h1>

  @if (loading) { <app-loader /> }
  @else {
    @if (error) {
      <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">{{ error }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" class="bg-white rounded-2xl shadow-sm p-8 space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Titre de l'événement</label>
        <input type="text" formControlName="title"
               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
        <textarea formControlName="description" rows="4"
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 resize-none"></textarea>
      </div>

      <div class="grid md:grid-cols-2 gap-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Date & heure</label>
          <input type="datetime-local" formControlName="date"
                 class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Lieu</label>
          <input type="text" formControlName="location"
                 class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500" />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Domaines cibles (séparés par des virgules)</label>
        <input type="text" formControlName="targetDomains" placeholder="Web Dev, Data Science"
               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-3">Types de contrat</label>
        <div class="flex flex-wrap gap-3">
          @for (ct of contractTypes; track ct) {
            <button type="button" (click)="toggleContractType(ct)"
                    [class]="(form.value.contractTypes || []).includes(ct)
                      ? 'px-4 py-2 rounded-full text-sm font-medium bg-primary-100 text-primary-700 border border-primary-300'
                      : 'px-4 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-700 border border-gray-200'">
              {{ contractLabels[ct] }}
            </button>
          }
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">LinkedIn de l'offre (optionnel)</label>
        <input type="url" formControlName="linkedinUrl" placeholder="https://linkedin.com/jobs/..."
               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500" />
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit" [disabled]="saving || form.invalid"
                class="px-6 py-3 bg-primary-600 text-white font-semibold rounded-lg hover:bg-primary-700 disabled:opacity-60 transition-colors">
          {{ saving ? 'Sauvegarde...' : (isEdit ? 'Modifier' : 'Créer l\'événement') }}
        </button>
        <a routerLink="/company/dashboard"
           class="px-6 py-3 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors">
          Annuler
        </a>
      </div>
    </form>
  }
</div>
