<div class="container mx-auto px-4 py-10 max-w-lg text-center">
  <h1 class="text-2xl font-bold mb-2">Scanner un profil</h1>
  <p class="text-gray-500 mb-8">Pointez la caméra vers le QR code d'un étudiant.</p>

  @if (scanError) {
    <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
      {{ scanError }}
    </div>
  }

  @if (scanning) {
    <div class="rounded-2xl overflow-hidden shadow-sm">
      <zxing-scanner
        [formats]="formats"
        (scanSuccess)="onScanSuccess($event)"
        (scanError)="onScanError($event)"
      ></zxing-scanner>
    </div>
    <p class="text-xs text-gray-400 mt-4">Accès à la caméra requis</p>
  } @else {
    <div class="py-12 text-gray-400">
      <p class="text-4xl mb-3">✅</p>
      <p>QR code détecté, redirection en cours...</p>
    </div>
  }
</div>
