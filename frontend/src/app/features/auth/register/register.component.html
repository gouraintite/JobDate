<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-sm p-8">
    <h1 class="text-2xl font-bold text-center mb-8">Créer un compte</h1>

    @if (error) {
      <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
        {{ error }}
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">
      <!-- Role selector -->
      <div class="grid grid-cols-2 gap-3">
        <label [class]="form.value.role === 'student' ? 'border-primary-500 bg-primary-50 text-primary-700' : 'border-gray-300 text-gray-600'"
               class="flex items-center justify-center gap-2 p-3 border-2 rounded-lg cursor-pointer transition-colors font-medium">
          <input type="radio" formControlName="role" value="student" class="hidden" />
          👨‍🎓 Étudiant
        </label>
        <label [class]="form.value.role === 'company' ? 'border-primary-500 bg-primary-50 text-primary-700' : 'border-gray-300 text-gray-600'"
               class="flex items-center justify-center gap-2 p-3 border-2 rounded-lg cursor-pointer transition-colors font-medium">
          <input type="radio" formControlName="role" value="company" class="hidden" />
          🏢 Entreprise
        </label>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          {{ form.value.role === 'company' ? 'Nom de l\'entreprise' : 'Prénom' }}
        </label>
        <input type="text" formControlName="name"
               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" formControlName="email"
               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500"
               placeholder="vous@exemple.fr" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
        <input type="password" formControlName="password"
               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500"
               placeholder="Minimum 8 caractères" />
      </div>

      <button type="submit" [disabled]="loading || form.invalid"
              class="w-full py-3 px-4 bg-primary-600 text-white font-semibold rounded-lg hover:bg-primary-700 disabled:opacity-60 transition-colors">
        {{ loading ? 'Inscription...' : 'Créer mon compte' }}
      </button>
    </form>

    <p class="text-center text-sm text-gray-600 mt-6">
      Déjà un compte ?
      <a routerLink="/login" class="text-primary-600 font-medium hover:underline">Se connecter</a>
    </p>
  </div>
</div>
